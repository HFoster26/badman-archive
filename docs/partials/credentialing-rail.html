<!--
  Credentialing rail partial
  Loaded via fetch() by bda-partials-loader.js into the placeholder:
    <aside id="bda-credentialing-rail" aria-label="About the author"></aside>
  Only pages that include that placeholder get the rail. Pages that omit
  the placeholder silently skip rail injection.
  The TOC ul#bda-page-toc-list is populated at runtime by buildPageTOC()
  from h2 headings inside <main>.
-->
<div class="bda-cred-rail-inner">

  <!-- Author card -->
  <section class="bda-cred-card bda-cred-author">
    <div class="bda-cred-author-header">
      <div class="bda-cred-author-photo">
        <img src="/assets/img/Headshot.jpg"
             alt=""
             width="72" height="72">
      </div>
      <div class="bda-cred-author-identity">
        <h3 class="bda-cred-author-name">Harry M. Foster</h3>
        <p class="bda-cred-author-pronouns">he/him/his</p>
      </div>
    </div>
    <p class="bda-cred-author-affiliation">
      Doctoral Candidate, Department of English, Michigan State University. Cultural Heritage Informatics Fellow.
    </p>
    <p class="bda-cred-author-bio">
      The Detroit Badman Archive is a digital humanities project documenting the Black masculine heroic tradition in Detroit.
    </p>
    <p class="bda-cred-author-link">
      <a href="/about/project/">About the project &rarr;</a>
    </p>
  </section>

  <!-- Page TOC card -->
  <nav id="bda-page-toc" class="bda-cred-card bda-cred-toc" aria-label="On this page">
    <h3 class="bda-cred-toc-heading">On this page</h3>
    <ul id="bda-page-toc-list">
      <!-- Populated at runtime from page h2 headings by buildPageTOC() -->
    </ul>
  </nav>

</div>
