<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- description updated at runtime by bda-figures-viewer.js from figure data -->
    <meta name="description" content="Individual figure entry in the Detroit Badman Archive. Biography, scoring, connections, geography, and primary sources for a documented Detroit badman.">
    <meta name="author" content="Harry Foster">
    <title>Figure | Detroit Badman Digital Archive</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">

    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Leaflet CSS (for map preview) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <!-- BDA styles -->
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <!-- Skip to content (WCAG 2.4.1) -->
    <a href="#bda-main-content" class="bda-skip-link">Skip to main content</a>

    <!-- Navbar (loaded by partials.js) -->
    <div id="bda-navbar"></div>

    <main id="bda-main-content" tabindex="-1">

        <section class="page-section bda-figure-page-section">
            <div class="container">

                <!-- Breadcrumb -->
                <nav aria-label="Breadcrumb" class="bda-figure-breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/">Home</a></li>
                        <li class="breadcrumb-item"><a href="/archive/figures/figures.html">Archive</a></li>
                        <li class="breadcrumb-item"><a href="/archive/figures/figures.html">Figures</a></li>
                        <li class="breadcrumb-item active" aria-current="page" id="bda-figure-breadcrumb-name">&nbsp;</li>
                    </ol>
                </nav>

                <!-- Two-column layout: main content + credentialing rail -->
                <div class="bda-figure-layout">

                    <article class="bda-figure-content">

                        <!-- Header: badges, name, era, score, creator (fictional only) -->
                        <header class="bda-figure-header" id="figure-header">
                            <!-- Populated by bda-figures-viewer.js renderHeader() -->
                        </header>

                        <!-- Justification essay -->
                        <section id="justification"
                                 class="bda-figure-section bda-figure-section-justification"
                                 aria-labelledby="bda-h-justification">
                            <h2 id="bda-h-justification">Justification Essay</h2>
                            <div id="bda-figure-justification" class="bda-figure-justification">
                                <!-- Populated by renderJustification() -->
                            </div>
                        </section>

                        <!-- Biography: description + timeline -->
                        <section id="biography"
                                 class="bda-figure-section bda-figure-section-biography"
                                 aria-labelledby="bda-h-biography">
                            <h2 id="bda-h-biography" class="sr-only">Biography</h2>
                            <div id="bda-figure-biography">
                                <!-- Populated by renderBiography() -->
                            </div>
                        </section>

                        <!-- Five-criteria evaluation -->
                        <section id="evaluation"
                                 class="bda-figure-section bda-figure-section-criteria"
                                 aria-labelledby="bda-h-evaluation">
                            <h2 id="bda-h-evaluation" class="sr-only">Five-Criteria Evaluation</h2>
                            <div id="bda-figure-criteria">
                                <!-- Populated by renderCriteria() -->
                            </div>
                        </section>

                        <!-- Connections grouped by edge type -->
                        <section id="connections"
                                 class="bda-figure-section bda-figure-section-connections"
                                 aria-labelledby="bda-h-connections">
                            <h2 id="bda-h-connections" class="sr-only">Connections</h2>
                            <div id="bda-figure-connections">
                                <!-- Populated by renderConnections() -->
                            </div>
                        </section>

                        <!-- Geography: primary location + territory + additional -->
                        <section id="geography"
                                 class="bda-figure-section bda-figure-section-geography"
                                 aria-labelledby="bda-h-geography">
                            <h2 id="bda-h-geography" class="sr-only">Geography</h2>
                            <div id="bda-figure-geography">
                                <!-- Populated by renderGeography() -->
                            </div>
                        </section>

                        <!-- Primary sources grid -->
                        <section id="primary-sources"
                                 class="bda-figure-section bda-figure-section-primary-sources"
                                 aria-labelledby="bda-h-primary-sources">
                            <h2 id="bda-h-primary-sources" class="sr-only">Primary Sources</h2>
                            <div id="bda-figure-primary-sources">
                                <!-- Populated by renderPrimarySources() -->
                            </div>
                        </section>

                        <!-- Related figures -->
                        <section id="related-figures"
                                 class="bda-figure-section bda-figure-section-related"
                                 aria-labelledby="bda-h-related-figures">
                            <h2 id="bda-h-related-figures" class="sr-only">Related Figures</h2>
                            <div id="bda-figure-related">
                                <!-- Populated by renderRelated() -->
                            </div>
                        </section>

                    </article>

                    <!-- Credentialing rail (loaded by partials.js) -->
                    <aside id="bda-credentialing-rail" aria-label="About the author">
                        <!-- Populated by bda-partials-loader.js with credentialing-rail.html -->
                    </aside>

                </div>
            </div>
        </section>

    </main>

    <!-- Footer (loaded by partials.js) -->
    <div id="bda-footer"></div>

    <!-- Leaflet JS (for map preview, even if viewer JS doesn't initialize it yet) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Partial loader -->
    <script src="/partials/partials.js"></script>
    <!-- Site-wide scripts -->
    <script src="/assets/js/scripts.js"></script>
    <!-- Figure page viewer script -->
    <script src="/archive/figures/entries/bda-figures-viewer.js"></script>
</body>
</html>
